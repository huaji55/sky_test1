name: Sky Daily Quest 

on:
  schedule:
    - cron: '45 6 * * *'
    - cron: '00 7 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-Quest-logic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        # 即使 import 隱藏在 Secret 裡，環境還是必須先安裝 requests
        run: pip install requests

      - name: Run Script
        env:
          B: ${{ secrets.B }}
          B1: ${{ secrets.B1 }}

          QUEST_TW_1: ${{ secrets.QUEST_TW }}

          QUEST_EN_1: ${{ secrets.QUEST_EN_1 }}
          QUEST_EN_2: ${{ secrets.QUEST_EN_2 }}

          QUEST_CN_1: ${{ secrets.QUEST_CN }}
          SCRIPT: ${{ secrets.SCRIPT }}

        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "SkyBot"
          git config --global user.email "bot@noreply.github.com"
          # 注意這裡：同時加入 data.json 和 archive 資料夾
          git add data.json archive/
          git commit -m "Update data & archive" || exit 0
          git push
